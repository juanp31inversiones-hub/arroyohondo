<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arroyohondo - Sistema de Gestión</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f5f0e8;color:#222;min-height:100vh}
    #app{display:flex;width:100%;min-height:100vh;position:relative}

    /* LOADING */
    #loading-screen{position:fixed;inset:0;background:#f5f0e8;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
    .spinner{width:48px;height:48px;border:5px solid #d1d5db;border-top-color:#2d5a3d;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loading-screen p{color:#6b7280;font-size:0.9rem}

    /* SIDEBAR */
    #sidebar{width:240px;min-height:100vh;background:#1a3a2a;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100%;z-index:1000;overflow-y:auto;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1)}
    #sidebar.collapsed{transform:translateX(-240px)}
    .sidebar-header{padding:24px 20px 20px;border-bottom:1px solid #2d5a3d;display:flex;align-items:center;gap:12px}
    .logo-horse{font-size:2rem}
    .logo-title{font-family:'Playfair Display',serif;color:#c9a84c;font-size:1.1rem;font-weight:700;letter-spacing:1px}
    .logo-sub{color:#6b9b7a;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase}
    .nav-menu{list-style:none;padding:12px 0;flex:1}
    .nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;color:#a8c4b0;cursor:pointer;transition:all .2s;font-size:0.875rem;font-weight:500;border-left:3px solid transparent}
    .nav-item:hover{background:#2d5a3d;color:#fff}
    .nav-item.active{background:#2d5a3d;color:#c9a84c;border-left-color:#c9a84c}
    .nav-item .icon{font-size:1.1rem;width:22px;text-align:center}

    /* OVERLAY */
    #sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999}
    #sidebar-overlay.active{display:block}

    /* HAMBURGER */
    #sidebar-toggle{position:fixed;top:14px;left:14px;z-index:1100;background:#1a3a2a;border:none;border-radius:8px;width:40px;height:40px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:8px;box-shadow:0 2px 8px rgba(0,0,0,0.3);transition:background 0.2s}
    #sidebar-toggle:hover{background:#2d5a3d}
    #sidebar-toggle span{display:block;width:20px;height:2px;background:#c9a84c;border-radius:2px;transition:all 0.3s}
    #sidebar-toggle.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    #sidebar-toggle.open span:nth-child(2){opacity:0;transform:scaleX(0)}
    #sidebar-toggle.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

    /* MAIN */
    #main{margin-left:240px;flex:1;min-width:0;min-height:100vh;padding:32px;transition:margin-left 0.3s cubic-bezier(0.4,0,0.2,1)}
    #main.expanded{margin-left:0}
    .section{display:none}
    .section.active{display:block}
    .section{padding-left:68px}

    @media (max-width:768px){
      #sidebar{transform:translateX(-240px)}
      #main{margin-left:0}
      .section{padding-left:60px}
    }
    @media (min-width:769px){
      #sidebar{transform:translateX(0)}
      #main{margin-left:240px}
      #sidebar-overlay{display:none !important}
    }

    /* PAGE HEADER */
    .page-header{margin-bottom:28px}
    .page-header h1{font-family:'Playfair Display',serif;font-size:1.8rem;color:#1a3a2a;font-weight:700}
    .page-header p{color:#6b7280;font-size:0.875rem;margin-top:4px}

    /* CARDS */
    .card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px}
    .stat-card{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid #c9a84c}
    .stat-card.green{border-left-color:#2d5a3d}
    .stat-card.red{border-left-color:#dc2626}
    .stat-card.blue{border-left-color:#2563eb}
    .stat-card.teal{border-left-color:#0d9488}
    .stat-num{font-size:2rem;font-weight:700;color:#1a3a2a;font-family:'Playfair Display',serif}
    .stat-label{font-size:0.8rem;color:#6b7280;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

    /* TOOLBAR */
    .toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
    .toolbar input,.toolbar select{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.85rem;background:#fff;font-family:'Inter',sans-serif;outline:none}
    .toolbar input:focus,.toolbar select:focus{border-color:#2d5a3d}
    .toolbar input{min-width:200px}
    .btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:0.85rem;font-weight:500;font-family:'Inter',sans-serif;transition:all .2s}
    .btn-primary{background:#2d5a3d;color:#fff}
    .btn-primary:hover{background:#1a3a2a}
    .btn-gold{background:#c9a84c;color:#fff}
    .btn-gold:hover{background:#b8942e}
    .btn-sm{padding:5px 12px;font-size:0.78rem}
    .btn-danger{background:#dc2626;color:#fff}
    .btn-danger:hover{background:#b91c1c}
    .btn-edit{background:#e0f2fe;color:#0369a1}
    .btn-edit:hover{background:#bae6fd}

    /* TABLE */
    .table-wrap{overflow-x:auto;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    table{width:100%;border-collapse:collapse;background:#fff;font-size:0.83rem}
    thead tr{background:#1a3a2a;color:#fff}
    thead th{padding:12px 14px;text-align:left;font-weight:600;white-space:nowrap;font-size:0.78rem;letter-spacing:.4px;text-transform:uppercase}
    tbody tr{border-bottom:1px solid #f3f4f6;transition:background .15s}
    tbody tr:hover{background:#f9fafb}
    tbody td{padding:11px 14px;vertical-align:middle}
    .actions{display:flex;gap:6px;white-space:nowrap}

    /* BADGES */
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.73rem;font-weight:600;white-space:nowrap}
    .badge-green{background:#d1fae5;color:#065f46}
    .badge-red{background:#fee2e2;color:#991b1b}
    .badge-blue{background:#dbeafe;color:#1e40af}
    .badge-orange{background:#fed7aa;color:#9a3412}
    .badge-teal{background:#ccfbf1;color:#115e59}
    .badge-purple{background:#ede9fe;color:#5b21b6}
    .badge-gray{background:#f3f4f6;color:#374151}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center}
    .modal-box{background:#fff;border-radius:16px;width:min(700px,95vw);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-header{padding:20px 24px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
    .modal-header span{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:600;color:#1a3a2a}
    .modal-header button{background:none;border:none;font-size:1.3rem;cursor:pointer;color:#6b7280;line-height:1}
    .modal-header button:hover{color:#111}
    .modal-body{padding:24px;overflow-y:auto;flex:1}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-grid.cols3{grid-template-columns:1fr 1fr 1fr}
    .form-full{grid-column:1/-1}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-group label{font-size:0.8rem;font-weight:600;color:#374151;text-transform:uppercase;letter-spacing:.3px}
    .form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.875rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#2d5a3d}
    .form-group textarea{resize:vertical;min-height:70px}
    .modal-footer{padding:16px 24px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:10px}
    .btn-cancel{background:#f3f4f6;color:#374151}
    .btn-cancel:hover{background:#e5e7eb}

    /* DASHBOARD */
    .dash-section-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:#1a3a2a;margin:24px 0 12px;font-weight:600}
    .recent-table table{font-size:0.82rem}

    /* FERIAS */
    .trophy{color:#c9a84c;font-weight:700}

    /* NOMINA */
    .nomina-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:4px solid #2d5a3d}
    .nomina-name{font-family:'Playfair Display',serif;font-size:1.1rem;color:#1a3a2a;margin-bottom:12px;font-weight:600}
    .nomina-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:0.83rem}
    .nomina-row:last-child{border-bottom:none}
    .nomina-total{font-weight:700;color:#1a3a2a;font-size:0.9rem;margin-top:8px}
    .nomina-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}

    /* CONSUMOS */
    tfoot tr{background:#f5f0e8;font-weight:700}
    tfoot td{padding:11px 14px}

    /* PLANEADOR */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
    .kpi-card{background:#fff;border-radius:12px;padding:20px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:4px solid #c9a84c}
    .kpi-value{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:#1a3a2a}
    .kpi-label{font-size:0.78rem;color:#6b7280;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
    .filter-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
    .filter-bar select{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.85rem;background:#fff;font-family:'Inter',sans-serif;outline:none}
    .filter-bar select:focus{border-color:#2d5a3d}
    .section-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px}
    .section-header h1{font-family:'Playfair Display',serif;font-size:1.8rem;color:#1a3a2a;font-weight:700}
    .section-header p{color:#6b7280;font-size:0.875rem;margin-top:4px}
    .form-input{padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.875rem;font-family:'Inter',sans-serif;outline:none;width:100%}
    .form-input:focus{border-color:#2d5a3d}

    /* ANIMALES TABLE — fix overflow and nombre column */
    #sec-animales .table-wrap { overflow-x: auto; max-width: 100%; }
    #sec-animales table { table-layout: fixed; min-width: 1100px; border-collapse: collapse; }
    #sec-animales td, #sec-animales th {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 0;
      padding: 10px 12px;
    }
    #sec-animales th { white-space: nowrap; }

    /* NOTA BUBBLE */
    .nota-bubble{cursor:help;margin-left:6px;font-size:0.9rem;position:relative}
    .nota-bubble:hover::after{content:attr(title);position:absolute;background:#1a3a2a;color:#fff;padding:6px 10px;border-radius:6px;font-size:0.8rem;max-width:250px;z-index:100;white-space:pre-wrap;left:0;top:1.4em}

    /* MINI CARDS (Dashboard) */
    .dash-subtitle{color:#1a3a2a;font-family:'Playfair Display';margin:24px 0 12px;font-size:1.1rem;border-bottom:2px solid #c9a84c;padding-bottom:6px}
    .mini-cards-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
    .mini-card{background:#fff;border:1px solid #e8dcc8;border-radius:10px;padding:14px 20px;text-align:center;min-width:100px}
    .mini-val{font-size:1.8rem;font-weight:700;color:#1a3a2a;font-family:'Playfair Display'}
    .mini-lbl{font-size:0.75rem;color:#666;margin-top:4px;text-transform:uppercase;letter-spacing:0.05em}

    /* ANIMALES TABLE */
    #anim-table{min-width:1200px;table-layout:fixed}

    /* Dashboard premium */
    .dash-hero {
      background: linear-gradient(135deg, #1a3a2a 0%, #2d5a3d 50%, #1a3a2a 100%);
      border-radius: 18px;
      padding: 36px 40px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }
    .dash-hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(201,168,76,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .dash-hero::after {
      content: '🐎';
      position: absolute;
      right: 40px;
      bottom: -10px;
      font-size: 120px;
      opacity: 0.08;
      line-height: 1;
    }
    .dash-hero-text h1 {
      font-family: 'Playfair Display', serif;
      color: #fff;
      font-size: 2rem;
      margin: 0 0 6px;
      font-weight: 700;
    }
    .dash-hero-text p {
      color: rgba(255,255,255,0.65);
      margin: 0;
      font-size: 0.95rem;
    }
    .dash-hero-badge {
      background: rgba(201,168,76,0.2);
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 50px;
      padding: 8px 18px;
      color: #c9a84c;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .dash-section-title {
      font-family: 'Playfair Display', serif;
      color: #1a3a2a;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 24px 0 12px;
      padding-left: 12px;
      border-left: 3px solid #c9a84c;
    }
    /* Quick Actions Bar */
    .quick-actions-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .qa-btn {
      background: #fff;
      border: 1.5px solid #e0d8cc;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #1a3a2a;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }
    .qa-btn:hover {
      background: #1a3a2a;
      color: #c9a84c;
      border-color: #1a3a2a;
    }
    /* Stat Strips */
    .stat-strip {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #ede8df;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .stat-strip-item {
      flex: 1;
      padding: 20px 16px;
      text-align: center;
      min-width: 0;
    }
    .ss-divider {
      width: 1px;
      background: #f0ebe3;
      flex-shrink: 0;
    }
    .ss-num {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #1a3a2a;
      line-height: 1;
      margin-bottom: 5px;
    }
    .ss-gold { color: #b8860b; }
    .ss-lbl {
      font-size: 0.72rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    @media (max-width: 600px) {
      .stat-strip { flex-wrap: wrap; }
      .stat-strip-item { min-width: 45%; border-bottom: 1px solid #f0ebe3; }
      .ss-divider { display: none; }
    }
    /* Distribution charts */
    .dist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 6px; }
    .dist-card { background: #fff; border-radius: 14px; padding: 20px 22px; border: 1px solid #ede8df; }
    .dist-card h4 { font-family: 'Playfair Display', serif; color: #1a3a2a; margin: 0 0 16px; font-size: 0.95rem; font-weight: 700; }
    .dist-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 0.85rem; }
    .dist-label { width: 110px; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
    .dist-bar-wrap { flex: 1; background: #f0ebe3; border-radius: 6px; height: 8px; }
    .dist-bar { background: linear-gradient(90deg, #1a3a2a, #2d5a3d); height: 8px; border-radius: 6px; transition: width 0.6s ease; }
    .dist-count { color: #1a3a2a; font-weight: 700; width: 24px; text-align: right; flex-shrink: 0; }
    /* Ferias */
    .feria-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f5f0e8; font-size: 0.84rem; }
    .feria-item:last-child { border-bottom: none; }
    .feria-mes { background: #1a3a2a; color: #c9a84c; border-radius: 6px; padding: 3px 8px; font-size: 0.7rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }

    /* Pedigree chart */
    .pedigree-chart {
      display: flex;
      align-items: stretch;
      min-width: 600px;
      gap: 0;
    }
    .ped-col { display: flex; flex-direction: column; }
    .ped-col-conn { width: 28px; flex-shrink: 0; }
    .ped-col-1 { flex: 0 0 200px; }
    .ped-col-2 { flex: 0 0 190px; }
    .ped-col-3 { flex: 0 0 180px; }
    .ped-col-4 { flex: 0 0 170px; }

    .ped-cell { display: flex; align-items: center; justify-content: flex-start; padding: 3px 0; }
    .ped-cell-full { flex: 1; }
    .ped-cell-half { flex: 0 0 50%; }
    .ped-cell-quarter { flex: 0 0 25%; }
    .ped-cell-eighth { flex: 0 0 12.5%; }

    /* Connector lines */
    .ped-line { width: 100%; height: 100%; position: relative; }
    .ped-line-top-right::before {
      content: '';
      position: absolute;
      right: 0; top: 50%;
      width: 40%; height: 1px;
      background: #c9a84c;
    }
    .ped-line-top-right::after {
      content: '';
      position: absolute;
      right: 40%; top: 0;
      width: 1px; height: 50%;
      background: #c9a84c;
    }
    .ped-line-bot-right::before {
      content: '';
      position: absolute;
      right: 0; top: 50%;
      width: 40%; height: 1px;
      background: #c9a84c;
    }
    .ped-line-bot-right::after {
      content: '';
      position: absolute;
      right: 40%; top: 50%;
      width: 1px; height: 50%;
      background: #c9a84c;
    }

    /* Pedigree boxes */
    .pedigree-box {
      border-radius: 8px;
      padding: 8px 10px;
      margin: 3px 4px;
      width: calc(100% - 8px);
      box-sizing: border-box;
      min-height: 54px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .pedigree-box.animal-box {
      background: #1a3a2a;
      border: 2px solid #c9a84c;
      padding: 14px 14px;
      min-height: 80px;
    }
    .animal-box .pb-name { color: #fff; font-size: 0.9rem; }
    .animal-box .pb-sub { color: rgba(255,255,255,0.65); }
    .animal-box .pb-label { color: #c9a84c; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
    .animal-box .pb-estado { color: #c9a84c; font-size: 0.7rem; margin-top: 4px; }

    .pedigree-box.in-db {
      background: #e8f4ec;
      border: 1.5px solid #2d5a3d;
    }
    .in-db .pb-name { color: #1a3a2a; }

    .pedigree-box.external {
      background: #fff;
      border: 1.5px solid #d0c8bc;
    }
    .external .pb-name { color: #444; }

    .pedigree-box.unknown {
      background: #f9f7f5;
      border: 1px dashed #ccc;
      opacity: 0.6;
    }
    .unknown .pb-name { color: #aaa; }

    .pb-name {
      font-weight: 700;
      font-size: 0.78rem;
      line-height: 1.3;
      font-family: 'Inter', sans-serif;
    }
    .pb-sub {
      font-size: 0.68rem;
      color: #888;
      margin-top: 2px;
    }
    .pb-abm {
      font-size: 0.65rem;
      color: #c9a84c;
      margin-top: 2px;
      margin-left: 4px;
      font-style: italic;
    }
  </style>
</head>
<body>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="spinner"></div>
  <p>Cargando datos de Arroyohondo...</p>
</div>

<div id="app" style="display:none">

// ── IN-MEMORY CACHE ───────────────────────────────────
let DB = { animales:[], saltos:[], embriones:[], nomina:[], consumos:[], ferias:[] };

// ── SORT STATE ────────────────────────────────────────
let sortField = 'nombre';
let sortDir = 'asc';

// ── HELPERS ──────────────────────────────────────────
function formatPeso(n){
  if(!n && n!==0) return '-';
  return '$' + Number(n).toLocaleString('es-CO');
}
function calcMeses(fechaNac){
  if(!fechaNac) return '-';
  const hoy = new Date();
  const nac = new Date(fechaNac);
  if(isNaN(nac)) return '-';
  let m = (hoy.getFullYear()-nac.getFullYear())*12 + (hoy.getMonth()-nac.getMonth());
  if(m < 0) m = 0;
  if(m < 1) return '< 1 mes';
  return `${m} meses`;
}
function estadoBadge(e){
  const map = {
    'En Propiedad':'badge-green','Vendido':'badge-red','Cedido':'badge-blue',
    'Pendiente':'badge-orange','Confirmada':'badge-teal','Nacido':'badge-purple',
    'Hecho':'badge-green','Enviado':'badge-gray'
  };
  return `<span class="badge ${map[e]||'badge-gray'}">${e}</span>`;
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── LOADING UI ────────────────────────────────────────
function showLoading(){ document.getElementById('loading-screen').style.display='flex'; document.getElementById('app').style.display='none'; }
function hideLoading(){ document.getElementById('loading-screen').style.display='none'; document.getElementById('app').style.display='flex'; }

// ── SUPABASE SEED ─────────────────────────────────────
async function seedIfEmpty(){
  // Check if animales table has data
  const {count} = await db.from('animales').select('*',{count:'exact',head:true});
  if(count > 0) return; // Already seeded

  // Seed all tables
  const tables = ['animales','saltos','embriones','nomina','consumos','ferias'];
  for(const t of tables){
    const rows = INITIAL_DATA[t];
    if(rows && rows.length){
      const {error} = await db.from(t).insert(rows);
      if(error) console.error('Seed error on',t,error);
    }
  }
}

// ── LOAD ALL DATA ─────────────────────────────────────
async function loadAllData(){
  const tables = ['animales','saltos','embriones','nomina','consumos','ferias'];
  await Promise.all(tables.map(async t => {
    const {data,error} = await db.from(t).select('*').order('id');
    if(error){ console.error(t,error); return; }
    DB[t] = data || [];
  }));
}

let currentSection = 'dashboard';
function showSection(name){
  currentSection = name;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>{
    if(n.getAttribute('onclick') && n.getAttribute('onclick').includes("'"+name+"'")) n.classList.add('active');
  });
  const renders = {dashboard:renderDashboard,animales:renderAnimales,mapa:renderMapaGenetico,saltos:renderSaltos,embriones:renderEmbriones,ferias:renderFerias,nomina:renderNomina,consumos:renderConsumos,planeador:renderPlaneadorSection};
  if(renders[name]) renders[name]();
  // Close sidebar on mobile when nav item is clicked
  if(window.innerWidth <= 768){
    const sidebar = document.getElementById('sidebar');
    const toggle = document.getElementById('sidebar-toggle');
    const overlay = document.getElementById('sidebar-overlay');
    const main = document.getElementById('main');
    sidebar.classList.add('collapsed');
    toggle.classList.remove('open');
    overlay.classList.remove('active');
    main.classList.add('expanded');
  }
}

function sortHeader(field, label) {
  const arrow = sortField===field ? (sortDir==='asc' ? ' ↑' : ' ↓') : '';
  return `<th onclick="setSort('${field}')" style="cursor:pointer;user-select:none;white-space:nowrap">${label}${arrow}</th>`;
}

function setSort(field) {
  if(sortField === field) sortDir = sortDir==='asc' ? 'desc' : 'asc';
  else { sortField = field; sortDir = 'asc'; }
  filterAnimales();
}

function getSortedAnimales(lista) {
  return [...lista].sort((a, b) => {
    let av = a[sortField] ?? '';
    let bv = b[sortField] ?? '';
    if(sortField === 'edad') { av = a.fecha_nac || ''; bv = b.fecha_nac || ''; }
    if(typeof av === 'string') av = av.toLowerCase();
    if(typeof bv === 'string') bv = bv.toLowerCase();
    if(av < bv) return sortDir === 'asc' ? -1 : 1;
    if(av > bv) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
}

function filterAnimales(){
  const search = (document.getElementById('anim-search')||{}).value?.toLowerCase()||'';
  const estado = (document.getElementById('anim-estado')||{}).value||'';
  const genero = (document.getElementById('anim-genero')||{}).value||'';
  const pasta  = (document.getElementById('anim-pasta')||{}).value||'';
  const filtered = DB.animales.filter(a=>{
    if(estado && a.estado!==estado) return false;
    if(genero && a.genero!==genero) return false;
    if(pasta  && a.pasta!==pasta)   return false;
    if(search && !a.nombre.toLowerCase().includes(search)) return false;
    return true;
  });
  const rows = getSortedAnimales(filtered);
  const thead = document.getElementById('anim-thead');
  if(thead) thead.innerHTML = `<tr>
    <th>#</th>
    ${sortHeader('nombre','Nombre')}

    ${sortHeader('fecha_nac','Fecha Nac.')}
    ${sortHeader('edad','Edad')}
    ${sortHeader('andar','Andar')}
    ${sortHeader('pasta','Pasta')}
    ${sortHeader('montador','Montador')}
    ${sortHeader('propietario','Propietario')}
    ${sortHeader('estado','Estado')}
    <th>Acciones</th>
  </tr>`;
  const tbody = document.getElementById('anim-tbody');
  if(!tbody) return;
  tbody.innerHTML = rows.map(a=>`
    <tr>
      <td>${a.id}</td>
      <td style="cursor:pointer" title="${esc(a.nombre)}" onclick="openAnimalProfile(${a.id})"><strong>${esc(a.nombre)}</strong>${a.nota?`<span class="nota-bubble" title="${esc(a.nota)}">💬</span>`:''}</td>
      <td title="${a.genero==='M'?'Macho':'Hembra'}">${a.genero==='M'?'M':'H'}</td>
      <td title="${esc(a.padre)}">${esc(a.padre)||'–'}</td>
      <td title="${esc(a.madre)}">${esc(a.madre)||'–'}</td>
      <td title="${esc(a.abm)}">${esc(a.abm)||'–'}</td>
      <td title="${a.fecha_nac||''}">${a.fecha_nac||'–'}</td>
      <td title="${calcMeses(a.fecha_nac)}">${calcMeses(a.fecha_nac)}</td>
      <td title="${esc(a.andar)}"><strong>${esc(a.andar)}</strong></td>
      <td title="${esc(a.pasta)}">${esc(a.pasta)||'–'}</td>
      <td title="${esc(a.montador)}">${esc(a.montador)||'–'}</td>
      <td title="${esc(a.propietario)}">${esc(a.propietario)||'–'}</td>

  fill('list-montador',   A.map(a => a.montador));
  fill('list-propietario',A.map(a => a.propietario));
}
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, (_,i) => Array.from({length:n+1}, (_,j) => i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function checkDuplicateName(inputId) {
  const val = document.getElementById(inputId)?.value?.trim().toLowerCase();
  if(!val || val.length < 3) return;
  const similar = DB.animales.filter(a => {
    if(!a.nombre) return false;
    const n = a.nombre.toLowerCase();
    return n.includes(val) || val.includes(n) || levenshtein(n, val) <= 3;
  });
  const warn = document.getElementById('nombre-warning');
  if(warn) {
    if(similar.length > 0) {
      warn.innerHTML = `⚠️ Nombres similares: ${similar.map(a=>a.nombre).join(', ')}`;
      warn.style.display = 'block';
    } else {
      warn.style.display = 'none';
    }
  }
}

function calcNomina(salarioBase, diasLaborados, comisiones=0, bonificaciones=0) {
  const SMLMV = 1423500;
  const AUX_TRANSP = 106454;
  const salarioProp = (salarioBase / 30) * diasLaborados;
  const auxTransp = salarioBase <= (SMLMV * 2) ? AUX_TRANSP : 0;
  const baseAportes = salarioProp + comisiones + bonificaciones;
  const totalDevengado = baseAportes + auxTransp;
  const saludEmpleado = Math.round(baseAportes * 0.04);
  const pensionEmpleado = Math.round(baseAportes * 0.04);
  const totalDeducciones = saludEmpleado + pensionEmpleado;
  const netoPagado = totalDevengado - totalDeducciones;
  const saludEmpleador = Math.round(baseAportes * 0.085);
  const pensionEmpleador = Math.round(baseAportes * 0.12);
  const arl = Math.round(baseAportes * 0.00522);
  const cajaComp = Math.round(baseAportes * 0.04);
  const icbf = Math.round(baseAportes * 0.03);
  const sena = Math.round(baseAportes * 0.02);
  const totalEmpleador = saludEmpleador + pensionEmpleador + arl + cajaComp + icbf + sena;
  const prima = Math.round(baseAportes * 0.0833);
  const cesantias = Math.round(baseAportes * 0.0833);
  const intCesantias = Math.round(cesantias * 0.12 / 12);
  const vacaciones = Math.round(salarioProp * 0.0417);
  const totalPrestaciones = prima + cesantias + intCesantias + vacaciones;
  const costoEmpresa = netoPagado + totalEmpleador + totalPrestaciones;
  return {
    salarioProp, auxTransp, baseAportes, totalDevengado,
    saludEmpleado, pensionEmpleado, totalDeducciones, netoPagado,
    saludEmpleador, pensionEmpleador, arl, cajaComp, icbf, sena, totalEmpleador,
    prima, cesantias, intCesantias, vacaciones, totalPrestaciones,
    costoEmpresa
  };
}

function savePlaneador() {
  localStorage.setItem('arroyohondo_planeador', JSON.stringify(PLANEADOR));
}

function renderPlaneador() {
  const mesFil = document.getElementById('plan-filter-mes')?.value || '';
  const decFil = document.getElementById('plan-filter-dec')?.value || '';
  let data = PLANEADOR.filter(f => {
    if(mesFil && f.mes !== mesFil) return false;
    if(decFil && f.decision !== decFil) return false;
    return true;
  });
  document.getElementById('plan-si').textContent = PLANEADOR.filter(f=>f.decision==='Sí vamos').length;
  document.getElementById('plan-no').textContent = PLANEADOR.filter(f=>f.decision==='No vamos').length;
  document.getElementById('plan-pend').textContent = PLANEADOR.filter(f=>f.decision==='Pendiente').length;
  document.getElementById('plan-total').textContent = PLANEADOR.length;
  const tbody = document.getElementById('planeador-tbody');
  tbody.innerHTML = data.map(f => {

// Find animal in DB by exact name match (case-insensitive)
function findByNombre(nombre) {
  if (!nombre || nombre === '-' || nombre === '') return null;
  const n = nombre.toLowerCase().trim();
  return DB.animales.find(a => a.nombre && a.nombre.toLowerCase().trim() === n) || null;
}

// Build pedigree tree node recursively (max depth generations above)
function buildNode(nombre, depth) {
  if (!nombre || nombre === '-' || depth < 0) return null;
  const animal = findByNombre(nombre);
  const node = {
    nombre: nombre,
    inDB: !!animal,
    data: animal,
    padre: null,
    madre: null,
  };
  if (animal && depth > 0) {
    if (animal.padre) node.padre = buildNode(animal.padre, depth - 1);
    if (animal.madre) node.madre = buildNode(animal.madre, depth - 1);
  }
  return node;
}

function renderArbol() {
  const id = parseInt(document.getElementById('tree-select').value);
  const container = document.getElementById('arbol-container');
  if (!id) { container.innerHTML = ''; return; }

  const animal = DB.animales.find(a => a.id === id);
  if (!animal) { container.innerHTML = ''; return; }

  // Build the pedigree tree (3 generations above = depth 2 for parents, who get depth 2 means they recurse 2 more)
  const tree = {
    nombre: animal.nombre,
    inDB: true,
    data: animal,
    padre: animal.padre ? buildNode(animal.padre, 2) : null,
    madre: animal.madre ? buildNode(animal.madre, 2) : null,
  };

  container.innerHTML = renderPedigreeHTML(tree, animal);
}

function renderPedigreeHTML(tree, animal) {
  const meses = calcMeses(animal.fecha_nac);

  // Pedigree box styles
  const boxInDB = (node) => `
    <div class="pedigree-box in-db" title="En el criadero">
      <div class="pb-name">${node.nombre}</div>
      <div class="pb-sub">${calcMeses(node.data.fecha_nac)} · ${node.data.andar||''} · ${node.data.genero==='M'?'M':'H'}</div>
    </div>`;

  const boxExternal = (node) => `
    <div class="pedigree-box external" title="Externo al criadero">
      <div class="pb-name">${node.nombre}</div>
      <div class="pb-sub">Externo</div>
    </div>`;

  const boxUnknown = () => `
    <div class="pedigree-box unknown">
      <div class="pb-name">–</div>
      <div class="pb-sub">Desconocido</div>
    </div>`;

  const renderBox = (node) => {
    if (!node) return boxUnknown();
    if (node.inDB) return boxInDB(node);
    return boxExternal(node);
  };

  // Extract all 4 generations:
  // Gen 2: padre, madre
  const padre = tree.padre;
  const madre = tree.madre;
  // Gen 3: grandparents
  const gppp = padre?.padre || null; // grandfather paternal
  const gppm = padre?.madre || null; // grandmother paternal
  const gpmp = madre?.padre || null; // grandfather maternal
  const gpmm = madre?.madre || null; // grandmother maternal
  // Gen 4: great-grandparents
  const ggppp = gppp?.padre || null;
  const ggppm = gppp?.madre || null;
  const ggpmp = gppm?.padre || null;
  const ggpmm = gppm?.madre || null;
  const ggmpp = gpmp?.padre || null;
  const ggmpm = gpmp?.madre || null;
  const ggmmp = gpmm?.padre || null;
  const ggmmm = gpmm?.madre || null;

  // Check if we have any gen 4 data
  const hasGen4 = ggppp || ggppm || ggpmp || ggpmm || ggmpp || ggmpm || ggmmp || ggmmm;
  // Check if we have any gen 3 data
  const hasGen3 = gppp || gppm || gpmp || gpmm;

  return `
    <div style="overflow-x:auto;padding:10px 0">
    <div class="pedigree-chart">

      <!-- ANIMAL (gen 1) -->
      <div class="ped-col ped-col-1">
        <div class="ped-cell ped-cell-full">
          <div class="pedigree-box animal-box">
            <div class="pb-label">ANIMAL</div>
            <div class="pb-name">${animal.nombre}</div>
            <div class="pb-sub">${animal.genero==='M'?'Macho':'Hembra'} · ${meses} · ${animal.andar||''}</div>
            ${animal.estado ? `<div class="pb-estado">${animal.estado}</div>` : ''}
          </div>
        </div>
      </div>

      <!-- CONNECTOR COL -->
      <div class="ped-col ped-col-conn">
        <div class="ped-cell ped-cell-half"><div class="ped-line ped-line-top-right"></div></div>
        <div class="ped-cell ped-cell-half"><div class="ped-line ped-line-bot-right"></div></div>
      </div>

      <!-- PARENTS (gen 2) -->
      <div class="ped-col ped-col-2">
        <div class="ped-cell ped-cell-half">
          ${renderBox(padre)}
          ${padre?.data?.abm ? `<div class="pb-abm">ABM: ${padre.data.abm}</div>` : ''}
        </div>
        <div class="ped-cell ped-cell-half">
          ${renderBox(madre)}
          ${madre?.data?.abm ? `<div class="pb-abm">ABM: ${madre.data.abm}</div>` : ''}
          ${animal.abm && !madre ? `<div class="pb-abm">ABM: ${animal.abm}</div>` : ''}
        </div>
      </div>

      ${hasGen3 ? `
      <!-- CONNECTOR COL -->
      <div class="ped-col ped-col-conn">
        <div class="ped-cell ped-cell-quarter"><div class="ped-line ped-line-top-right"></div></div>
        <div class="ped-cell ped-cell-quarter"><div class="ped-line ped-line-bot-right"></div></div>
        <div class="ped-cell ped-cell-quarter"><div class="ped-line ped-line-top-right"></div></div>
        <div class="ped-cell ped-cell-quarter"><div class="ped-line ped-line-bot-right"></div></div>
      </div>

      <!-- GRANDPARENTS (gen 3) -->
      <div class="ped-col ped-col-3">
        <div class="ped-cell ped-cell-quarter">${renderBox(gppp)}</div>
        <div class="ped-cell ped-cell-quarter">${renderBox(gppm)}</div>
        <div class="ped-cell ped-cell-quarter">${renderBox(gpmp)}</div>
        <div class="ped-cell ped-cell-quarter">${renderBox(gpmm)}</div>
      </div>
      ` : ''}

      ${hasGen4 ? `
      <!-- CONNECTOR COL -->
      <div class="ped-col ped-col-conn">
        ${[ggppp,ggppm,ggpmp,ggpmm,ggmpp,ggmpm,ggmmp,ggmmm].map((_,i) =>
          `<div class="ped-cell ped-cell-eighth">
            <div class="ped-line ${i%2===0?'ped-line-top-right':'ped-line-bot-right'}"></div>
          </div>`
        ).join('')}
      </div>

      <!-- GREAT-GRANDPARENTS (gen 4) -->
      <div class="ped-col ped-col-4">
        ${[ggppp,ggppm,ggpmp,ggpmm,ggmpp,ggmpm,ggmmp,ggmmm].map(node =>
          `<div class="ped-cell ped-cell-eighth">${renderBox(node)}</div>`
        ).join('')}
      </div>
      ` : ''}

    </div>
    </div>

    <!-- LEGEND -->
    <div style="display:flex;gap:16px;margin-top:14px;font-size:0.78rem;color:#666;flex-wrap:wrap">
      <span><span style="display:inline-block;width:12px;height:12px;background:#1a3a2a;border-radius:3px;vertical-align:middle;margin-right:4px"></span>Animal del criadero</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:#e8f0e8;border:1px solid #2d5a3d;border-radius:3px;vertical-align:middle;margin-right:4px"></span>Externo al criadero</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:#f5f5f5;border:1px solid #ddd;border-radius:3px;vertical-align:middle;margin-right:4px"></span>Sin información</span>
    </div>
  `;
}

  const main = document.getElementById('main');
  const toggle = document.getElementById('sidebar-toggle');
  const overlay = document.getElementById('sidebar-overlay');
  const isMobile = window.innerWidth <= 768;
  const isCollapsed = sidebar.classList.contains('collapsed');
  if(isCollapsed){
    sidebar.classList.remove('collapsed');
    toggle.classList.add('open');
    if(isMobile){
      main.classList.add('expanded');
      overlay.classList.add('active');
    } else {
      main.classList.remove('expanded');
    }
  } else {
    sidebar.classList.add('collapsed');
    toggle.classList.remove('open');
    main.classList.add('expanded');
    overlay.classList.remove('active');
  }
  if(!isMobile){
    localStorage.setItem('sidebarOpen', isCollapsed ? 'true' : 'false');
  }
}

function initSidebar(){
  const isMobile = window.innerWidth <= 768;
  const sidebar = document.getElementById('sidebar');
  const main = document.getElementById('main');
  const toggle = document.getElementById('sidebar-toggle');
  if(isMobile){
    sidebar.classList.add('collapsed');
    main.classList.add('expanded');
    toggle.classList.remove('open');
  } else {
    const saved = localStorage.getItem('sidebarOpen');
    if(saved === 'false'){
      sidebar.classList.add('collapsed');
      main.classList.add('expanded');
      toggle.classList.remove('open');
    } else {
      sidebar.classList.remove('collapsed');
      main.classList.remove('expanded');
      toggle.classList.add('open');
    }
  }
}

window.addEventListener('resize', ()=>{
  const isMobile = window.innerWidth <= 768;
  const sidebar = document.getElementById('sidebar');
  const main = document.getElementById('main');
  const overlay = document.getElementById('sidebar-overlay');
  if(!isMobile){
    overlay.classList.remove('active');
    const saved = localStorage.getItem('sidebarOpen');
    if(saved === 'false'){
      sidebar.classList.add('collapsed');
      main.classList.add('expanded');
    } else {
      sidebar.classList.remove('collapsed');
      main.classList.remove('expanded');
    }
  } else {
    main.classList.add('expanded');
  }
});

async function init(){
  showLoading();
  try {
    await seedIfEmpty();
    await loadAllData();
  } catch(e) {
    console.error('Init error', e);
  }
  hideLoading();
  populateDataLists();
  renderDashboard();
  initSidebar();
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arroyohondo - Sistema de Gestión</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f5f0e8;color:#222;display:flex;min-height:100vh}
    #app{display:flex;width:100%;min-height:100vh}

    /* LOADING */
    #loading-screen{position:fixed;inset:0;background:#f5f0e8;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
    .spinner{width:48px;height:48px;border:5px solid #d1d5db;border-top-color:#2d5a3d;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loading-screen p{color:#6b7280;font-size:0.9rem}

    /* SIDEBAR */
    #sidebar{width:240px;min-height:100vh;background:#1a3a2a;display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100}
    .sidebar-header{padding:24px 20px 20px;border-bottom:1px solid #2d5a3d;display:flex;align-items:center;gap:12px}
    .logo-horse{font-size:2rem}
    .logo-title{font-family:'Playfair Display',serif;color:#c9a84c;font-size:1.1rem;font-weight:700;letter-spacing:1px}
    .logo-sub{color:#6b9b7a;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase}
    .nav-menu{list-style:none;padding:12px 0;flex:1}
    .nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;color:#a8c4b0;cursor:pointer;transition:all .2s;font-size:0.875rem;font-weight:500;border-left:3px solid transparent}
    .nav-item:hover{background:#2d5a3d;color:#fff}
    .nav-item.active{background:#2d5a3d;color:#c9a84c;border-left-color:#c9a84c}
    .nav-item .icon{font-size:1.1rem;width:22px;text-align:center}

    /* MAIN */
    #main{margin-left:240px;flex:1;padding:32px;min-height:100vh}
    .section{display:none}
    .section.active{display:block}

    /* PAGE HEADER */
    .page-header{margin-bottom:28px}
    .page-header h1{font-family:'Playfair Display',serif;font-size:1.8rem;color:#1a3a2a;font-weight:700}
    .page-header p{color:#6b7280;font-size:0.875rem;margin-top:4px}

    /* CARDS */
    .card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px}
    .stat-card{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid #c9a84c}
    .stat-card.green{border-left-color:#2d5a3d}
    .stat-card.red{border-left-color:#dc2626}
    .stat-card.blue{border-left-color:#2563eb}
    .stat-card.teal{border-left-color:#0d9488}
    .stat-num{font-size:2rem;font-weight:700;color:#1a3a2a;font-family:'Playfair Display',serif}
    .stat-label{font-size:0.8rem;color:#6b7280;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

    /* TOOLBAR */
    .toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
    .toolbar input,.toolbar select{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.85rem;background:#fff;font-family:'Inter',sans-serif;outline:none}
    .toolbar input:focus,.toolbar select:focus{border-color:#2d5a3d}
    .toolbar input{min-width:200px}
    .btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:0.85rem;font-weight:500;font-family:'Inter',sans-serif;transition:all .2s}
    .btn-primary{background:#2d5a3d;color:#fff}
    .btn-primary:hover{background:#1a3a2a}
    .btn-gold{background:#c9a84c;color:#fff}
    .btn-gold:hover{background:#b8942e}
    .btn-sm{padding:5px 12px;font-size:0.78rem}
    .btn-danger{background:#dc2626;color:#fff}
    .btn-danger:hover{background:#b91c1c}
    .btn-edit{background:#e0f2fe;color:#0369a1}
    .btn-edit:hover{background:#bae6fd}

    /* TABLE */
    .table-wrap{overflow-x:auto;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    table{width:100%;border-collapse:collapse;background:#fff;font-size:0.83rem}
    thead tr{background:#1a3a2a;color:#fff}
    thead th{padding:12px 14px;text-align:left;font-weight:600;white-space:nowrap;font-size:0.78rem;letter-spacing:.4px;text-transform:uppercase}
    tbody tr{border-bottom:1px solid #f3f4f6;transition:background .15s}
    tbody tr:hover{background:#f9fafb}
    tbody td{padding:11px 14px;vertical-align:middle}
    .actions{display:flex;gap:6px;white-space:nowrap}

    /* BADGES */
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.73rem;font-weight:600;white-space:nowrap}
    .badge-green{background:#d1fae5;color:#065f46}
    .badge-red{background:#fee2e2;color:#991b1b}
    .badge-blue{background:#dbeafe;color:#1e40af}
    .badge-orange{background:#fed7aa;color:#9a3412}
    .badge-teal{background:#ccfbf1;color:#115e59}
    .badge-purple{background:#ede9fe;color:#5b21b6}
    .badge-gray{background:#f3f4f6;color:#374151}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center}
    .modal-box{background:#fff;border-radius:16px;width:min(700px,95vw);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-header{padding:20px 24px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
    .modal-header span{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:600;color:#1a3a2a}
    .modal-header button{background:none;border:none;font-size:1.3rem;cursor:pointer;color:#6b7280;line-height:1}
    .modal-header button:hover{color:#111}
    .modal-body{padding:24px;overflow-y:auto;flex:1}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-grid.cols3{grid-template-columns:1fr 1fr 1fr}
    .form-full{grid-column:1/-1}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-group label{font-size:0.8rem;font-weight:600;color:#374151;text-transform:uppercase;letter-spacing:.3px}
    .form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.875rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#2d5a3d}
    .form-group textarea{resize:vertical;min-height:70px}
    .modal-footer{padding:16px 24px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:10px}
    .btn-cancel{background:#f3f4f6;color:#374151}
    .btn-cancel:hover{background:#e5e7eb}

    /* DASHBOARD */
    .dash-section-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:#1a3a2a;margin:24px 0 12px;font-weight:600}
    .recent-table table{font-size:0.82rem}

    /* FERIAS */
    .trophy{color:#c9a84c;font-weight:700}

    /* NOMINA */
    .nomina-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:4px solid #2d5a3d}
    .nomina-name{font-family:'Playfair Display',serif;font-size:1.1rem;color:#1a3a2a;margin-bottom:12px;font-weight:600}
    .nomina-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:0.83rem}
    .nomina-row:last-child{border-bottom:none}
    .nomina-total{font-weight:700;color:#1a3a2a;font-size:0.9rem;margin-top:8px}
    .nomina-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}

    /* CONSUMOS */
    tfoot tr{background:#f5f0e8;font-weight:700}
    tfoot td{padding:11px 14px}

    /* PLANEADOR */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
    .kpi-card{background:#fff;border-radius:12px;padding:20px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:4px solid #c9a84c}
    .kpi-value{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:#1a3a2a}
    .kpi-label{font-size:0.78rem;color:#6b7280;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
    .filter-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
    .filter-bar select{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.85rem;background:#fff;font-family:'Inter',sans-serif;outline:none}
    .filter-bar select:focus{border-color:#2d5a3d}
    .section-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px}
    .section-header h1{font-family:'Playfair Display',serif;font-size:1.8rem;color:#1a3a2a;font-weight:700}
    .section-header p{color:#6b7280;font-size:0.875rem;margin-top:4px}
    .form-input{padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.875rem;font-family:'Inter',sans-serif;outline:none;width:100%}
    .form-input:focus{border-color:#2d5a3d}

    /* NOTA BUBBLE */
    .nota-bubble{cursor:help;margin-left:6px;font-size:0.9rem;position:relative}
    .nota-bubble:hover::after{content:attr(title);position:absolute;background:#1a3a2a;color:#fff;padding:6px 10px;border-radius:6px;font-size:0.8rem;max-width:250px;z-index:100;white-space:pre-wrap;left:0;top:1.4em}

    /* MINI CARDS (Dashboard) */
    .dash-subtitle{color:#1a3a2a;font-family:'Playfair Display';margin:24px 0 12px;font-size:1.1rem;border-bottom:2px solid #c9a84c;padding-bottom:6px}
    .mini-cards-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
    .mini-card{background:#fff;border:1px solid #e8dcc8;border-radius:10px;padding:14px 20px;text-align:center;min-width:100px}
    .mini-val{font-size:1.8rem;font-weight:700;color:#1a3a2a;font-family:'Playfair Display'}
    .mini-lbl{font-size:0.75rem;color:#666;margin-top:4px;text-transform:uppercase;letter-spacing:0.05em}

    /* ANIMALES TABLE */
    #anim-table{min-width:1200px;table-layout:fixed}
  </style>
</head>

// ── IN-MEMORY CACHE ───────────────────────────────────
let DB = { animales:[], saltos:[], embriones:[], nomina:[], consumos:[], ferias:[] };

// ── HELPERS ──────────────────────────────────────────
function formatPeso(n){
  if(!n && n!==0) return '-';
  return '$' + Number(n).toLocaleString('es-CO');
}
function calcMeses(fechaNac){
  if(!fechaNac) return '-';
  const hoy = new Date();
  const nac = new Date(fechaNac);
  if(isNaN(nac)) return '-';
  let m = (hoy.getFullYear()-nac.getFullYear())*12 + (hoy.getMonth()-nac.getMonth());
  if(m < 0) m = 0;
  if(m < 1) return '< 1 mes';
  return `${m} meses`;
}
function estadoBadge(e){
  const map = {
    'En Propiedad':'badge-green','Vendido':'badge-red','Cedido':'badge-blue',
    'Pendiente':'badge-orange','Confirmada':'badge-teal','Nacido':'badge-purple',
    'Hecho':'badge-green','Enviado':'badge-gray'
  };
  return `<span class="badge ${map[e]||'badge-gray'}">${e}</span>`;
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── LOADING UI ────────────────────────────────────────
function showLoading(){ document.getElementById('loading-screen').style.display='flex'; document.getElementById('app').style.display='none'; }
function hideLoading(){ document.getElementById('loading-screen').style.display='none'; document.getElementById('app').style.display='flex'; }

// ── SUPABASE SEED ─────────────────────────────────────
async function seedIfEmpty(){
  // Check if animales table has data
  const {count} = await db.from('animales').select('*',{count:'exact',head:true});
  if(count > 0) return; // Already seeded

  // Seed all tables
  const tables = ['animales','saltos','embriones','nomina','consumos','ferias'];
  for(const t of tables){
    const rows = INITIAL_DATA[t];
    if(rows && rows.length){
      const {error} = await db.from(t).insert(rows);
      if(error) console.error('Seed error on',t,error);
    }
  }
}

// ── LOAD ALL DATA ─────────────────────────────────────
async function loadAllData(){
  const tables = ['animales','saltos','embriones','nomina','consumos','ferias'];
  await Promise.all(tables.map(async t => {
    const {data,error} = await db.from(t).select('*').order('id');
    if(error){ console.error(t,error); return; }
    DB[t] = data || [];
  }));
}

// ── NAVIGATION ────────────────────────────────────────
let currentSection = 'dashboard';
function showSection(name){
  currentSection = name;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>{
    if(n.getAttribute('onclick') && n.getAttribute('onclick').includes("'"+name+"'")) n.classList.add('active');
  });
  const renders = {dashboard:renderDashboard,animales:renderAnimales,mapa:renderMapaGenetico,saltos:renderSaltos,embriones:renderEmbriones,ferias:renderFerias,nomina:renderNomina,consumos:renderConsumos,planeador:renderPlaneadorSection};
  if(renders[name]) renders[name]();
}

function filterAnimales(){
  const search = (document.getElementById('anim-search')||{}).value?.toLowerCase()||'';
  const estado = (document.getElementById('anim-estado')||{}).value||'';
  const genero = (document.getElementById('anim-genero')||{}).value||'';
  const pasta  = (document.getElementById('anim-pasta')||{}).value||'';
  const rows = DB.animales.filter(a=>{
    if(estado && a.estado!==estado) return false;
    if(genero && a.genero!==genero) return false;
    if(pasta  && a.pasta!==pasta)   return false;
    if(search && !a.nombre.toLowerCase().includes(search)) return false;
    return true;
  });
  const tbody = document.getElementById('anim-tbody');
  if(!tbody) return;
  tbody.innerHTML = rows.map(a=>`
    <tr>
      <td>${a.id}</td>
      <td style="cursor:pointer;white-space:nowrap" onclick="openAnimalProfile(${a.id})"><strong>${esc(a.nombre)}</strong>${a.nota?`<span class="nota-bubble" title="${esc(a.nota)}">💬</span>`:''}</td>
      <td style="text-align:center;white-space:nowrap">${a.genero==='M'?'M':'H'}</td>
      <td style="white-space:nowrap">${esc(a.padre)||'-'}</td>
      <td style="white-space:nowrap">${esc(a.madre)||'-'}</td>
      <td style="white-space:nowrap">${esc(a.abm)||'-'}</td>
      <td style="white-space:nowrap">${a.fecha_nac||'-'}</td>
      <td style="white-space:nowrap">${calcMeses(a.fecha_nac)}</td>
      <td style="white-space:nowrap"><strong>${esc(a.andar)}</strong></td>
      <td style="white-space:nowrap">${esc(a.pasta)||'-'}</td>
      <td style="white-space:nowrap">${esc(a.montador)||'-'}</td>
      <td style="white-space:nowrap">${esc(a.propietario)||'-'}</td>
      <td style="white-space:nowrap">${estadoBadge(a.estado)}</td>
      <td class="actions">
        <button class="btn btn-sm btn-edit" onclick="editAnimal(${a.id})">Editar</button>
        <button class="btn btn-sm btn-danger" onclick="deleteAnimal(${a.id})">Borrar</button>
      </td>
    </tr>`).join('');
}

      </div>
      <div style="background:#f5f0e8;border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:1.5rem;font-weight:700;color:#1a3a2a">${saltosVendidos}</div>
        <div style="font-size:0.75rem;color:#666">SALTOS/EMBRIONES</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;font-size:0.9rem">
      <div><span style="color:#999">Padre:</span> ${a.padre||'-'}</div>
      <div><span style="color:#999">Madre:</span> ${a.madre||'-'}</div>
      <div><span style="color:#999">ABM:</span> ${a.abm||'-'}</div>
      <div><span style="color:#999">Andar:</span> ${a.andar||'-'}</div>

      <div><span style="color:#999">Propietario:</span> ${a.propietario||'-'}</div>
      <div><span style="color:#999">Estado:</span> ${a.estado||'-'}</div>

function calcNomina(salarioBase, diasLaborados, comisiones=0, bonificaciones=0) {
  const SMLMV = 1423500;
  const AUX_TRANSP = 106454;
  const salarioProp = (salarioBase / 30) * diasLaborados;
  const auxTransp = salarioBase <= (SMLMV * 2) ? AUX_TRANSP : 0;
  const baseAportes = salarioProp + comisiones + bonificaciones;
  const totalDevengado = baseAportes + auxTransp;
  const saludEmpleado = Math.round(baseAportes * 0.04);
  const pensionEmpleado = Math.round(baseAportes * 0.04);
  const totalDeducciones = saludEmpleado + pensionEmpleado;
  const netoPagado = totalDevengado - totalDeducciones;
  const saludEmpleador = Math.round(baseAportes * 0.085);
  const pensionEmpleador = Math.round(baseAportes * 0.12);
  const arl = Math.round(baseAportes * 0.00522);
  const cajaComp = Math.round(baseAportes * 0.04);
  const icbf = Math.round(baseAportes * 0.03);
  const sena = Math.round(baseAportes * 0.02);
  const totalEmpleador = saludEmpleador + pensionEmpleador + arl + cajaComp + icbf + sena;
  const prima = Math.round(baseAportes * 0.0833);
  const cesantias = Math.round(baseAportes * 0.0833);
  const intCesantias = Math.round(cesantias * 0.12 / 12);
  const vacaciones = Math.round(salarioProp * 0.0417);
  const totalPrestaciones = prima + cesantias + intCesantias + vacaciones;
  const costoEmpresa = netoPagado + totalEmpleador + totalPrestaciones;
  return {
    salarioProp, auxTransp, baseAportes, totalDevengado,
    saludEmpleado, pensionEmpleado, totalDeducciones, netoPagado,
    saludEmpleador, pensionEmpleador, arl, cajaComp, icbf, sena, totalEmpleador,
    prima, cesantias, intCesantias, vacaciones, totalPrestaciones,
    costoEmpresa
  };
}

let PLANEADOR = JSON.parse(localStorage.getItem('arroyohondo_planeador') || 'null') || FERIAS_2026.map(f => ({...f}));

function savePlaneador() {
  localStorage.setItem('arroyohondo_planeador', JSON.stringify(PLANEADOR));
}

function renderPlaneador() {
  const mesFil = document.getElementById('plan-filter-mes')?.value || '';
  const decFil = document.getElementById('plan-filter-dec')?.value || '';
  let data = PLANEADOR.filter(f => {
    if(mesFil && f.mes !== mesFil) return false;
    if(decFil && f.decision !== decFil) return false;
    return true;
  });
  document.getElementById('plan-si').textContent = PLANEADOR.filter(f=>f.decision==='Sí vamos').length;
  document.getElementById('plan-no').textContent = PLANEADOR.filter(f=>f.decision==='No vamos').length;
  document.getElementById('plan-pend').textContent = PLANEADOR.filter(f=>f.decision==='Pendiente').length;
  document.getElementById('plan-total').textContent = PLANEADOR.length;
  const tbody = document.getElementById('planeador-tbody');
  tbody.innerHTML = data.map(f => {
    const decColor = f.decision==='Sí vamos'?'#16a34a':f.decision==='No vamos'?'#dc2626':'#d97706';
    return `<tr>
      <td>${f.mes}</td>
      <td><strong>${f.nombre}</strong></td>
      <td>${f.ciudad}</td>
      <td><span class="badge" style="background:#1a3a2a;color:#c9a84c">${f.categoria}</span></td>
      <td><span class="badge" style="background:${decColor};color:#fff">${f.decision}</span></td>
      <td>${f.animales || '<em style="color:#999">Sin definir</em>'}</td>
      <td>${f.notas || ''}</td>
      <td>
        <button class="btn btn-sm btn-edit" onclick="editFeriaPlaneador(${f.id})">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="deleteFeriaPlaneador(${f.id})">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

function addFeriaPlaneador() {
  openModal('Agregar Feria al Planeador', `
    <div class="form-grid">
      <label>Mes<select id="fp-mes" class="form-input">
        <option>Enero</option><option>Febrero</option><option>Marzo</option><option>Abril</option>
        <option>Mayo</option><option>Junio</option><option>Julio</option><option>Agosto</option>
        <option>Septiembre</option><option>Octubre</option><option>Noviembre</option><option>Diciembre</option>
      </select></label>
      <label>Nombre de la Feria<input id="fp-nombre" class="form-input" type="text"></label>
      <label>Ciudad<input id="fp-ciudad" class="form-input" type="text"></label>
      <label>Categoría<select id="fp-cat" class="form-input"><option>A</option><option>AA</option><option>B</option></select></label>
      <label>Decisión<select id="fp-dec" class="form-input"><option>Pendiente</option><option>Sí vamos</option><option>No vamos</option></select></label>
      <label>Animales a llevar<input id="fp-animales" class="form-input" type="text" placeholder="Ej: Hidalgo, Canela"></label>
      <label style="grid-column:span 2">Notas<textarea id="fp-notas" class="form-input" rows="2"></textarea></label>
    </div>
  `, () => {
    const newId = Math.max(...PLANEADOR.map(f=>f.id), 0) + 1;
    PLANEADOR.push({
      id: newId,
      mes: document.getElementById('fp-mes').value,
      nombre: document.getElementById('fp-nombre').value,
      ciudad: document.getElementById('fp-ciudad').value,
      categoria: document.getElementById('fp-cat').value,
      decision: document.getElementById('fp-dec').value,
      animales: document.getElementById('fp-animales').value,
      notas: document.getElementById('fp-notas').value
    });
    savePlaneador();
    renderPlaneador();
  });
}

function editFeriaPlaneador(id) {
  const f = PLANEADOR.find(x=>x.id===id);
  if(!f) return;
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const cats = ['A','AA','B'];
  const decs = ['Pendiente','Sí vamos','No vamos'];
  openModal('Editar Feria', `
    <div class="form-grid">
      <label>Mes<select id="fp-mes" class="form-input">
        ${meses.map(m=>`<option${m===f.mes?' selected':''}>${m}</option>`).join('')}
      </select></label>
      <label>Nombre de la Feria<input id="fp-nombre" class="form-input" type="text" value="${f.nombre}"></label>
      <label>Ciudad<input id="fp-ciudad" class="form-input" type="text" value="${f.ciudad}"></label>
      <label>Categoría<select id="fp-cat" class="form-input">
        ${cats.map(c=>`<option${c===f.categoria?' selected':''}>${c}</option>`).join('')}
      </select></label>
      <label>Decisión<select id="fp-dec" class="form-input">
        ${decs.map(d=>`<option${d===f.decision?' selected':''}>${d}</option>`).join('')}
      </select></label>
      <label>Animales a llevar<input id="fp-animales" class="form-input" type="text" value="${f.animales||''}"></label>
      <label style="grid-column:span 2">Notas<textarea id="fp-notas" class="form-input" rows="2">${f.notas||''}</textarea></label>
    </div>
  `, () => {
    f.mes = document.getElementById('fp-mes').value;
    f.nombre = document.getElementById('fp-nombre').value;
    f.ciudad = document.getElementById('fp-ciudad').value;
    f.categoria = document.getElementById('fp-cat').value;
    f.decision = document.getElementById('fp-dec').value;
    f.animales = document.getElementById('fp-animales').value;
    f.notas = document.getElementById('fp-notas').value;
    savePlaneador();
    renderPlaneador();
  });
}

function deleteFeriaPlaneador(id) {
  if(!confirm('¿Eliminar esta feria del planeador?')) return;
  PLANEADOR = PLANEADOR.filter(f=>f.id!==id);
  savePlaneador();
  renderPlaneador();
}

// ── MAPA GENÉTICO ─────────────────────────────────────
function renderMapaGenetico() {
  const animales = DB.animales || [];
  const padreCount = {};
  animales.forEach(a => { if(a.padre) padreCount[a.padre] = (padreCount[a.padre]||0)+1; });
  const topPadres = Object.entries(padreCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const madreCount = {};
  animales.forEach(a => { if(a.madre) madreCount[a.madre] = (madreCount[a.madre]||0)+1; });
  const topMadres = Object.entries(madreCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const abmCount = {};
  animales.forEach(a => { if(a.abm && a.abm !== '-') abmCount[a.abm] = (abmCount[a.abm]||0)+1; });
  const topAbm = Object.entries(abmCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const crucesCount = {};
  animales.forEach(a => {
    if(a.padre && a.madre) {
      const key = `${a.padre} × ${a.madre}`;
      crucesCount[key] = (crucesCount[key]||0)+1;
    }
  });
  const topCruces = Object.entries(crucesCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxPadre = topPadres[0]?.[1] || 1;
  const maxMadre = topMadres[0]?.[1] || 1;
  const animalOptions = animales.map(a=>`<option value="${a.id}">${esc(a.nombre)}</option>`).join('');

  document.getElementById('sec-mapa').innerHTML = `
    <div class="section-header">
      <div><h1>🧬 Mapa Genético</h1><p>Análisis de cruces y genealogía del criadero</p></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px">
      <div style="background:#fff;border-radius:12px;padding:20px;border:1px solid #e8dcc8">
        <h3 style="color:#1a3a2a;font-family:'Playfair Display';margin:0 0 16px;border-bottom:2px solid #c9a84c;padding-bottom:8px">🐴 Sementales más usados</h3>
        ${topPadres.length ? topPadres.map(([nombre,count],i) => `
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:3px">
              <span><strong>#${i+1}</strong> ${esc(nombre)}</span><span style="color:#c9a84c;font-weight:700">${count} hijos</span>
            </div>
            <div style="background:#f0f0f0;border-radius:4px;height:6px">
              <div style="background:#c9a84c;height:6px;border-radius:4px;width:${(count/maxPadre*100)}%"></div>
            </div>
          </div>`).join('') : '<p style="color:#999;font-size:0.85rem">Sin datos</p>'}
      </div>
      <div style="background:#fff;border-radius:12px;padding:20px;border:1px solid #e8dcc8">
        <h3 style="color:#1a3a2a;font-family:'Playfair Display';margin:0 0 16px;border-bottom:2px solid #c9a84c;padding-bottom:8px">🐎 Yeguas más productivas</h3>
        ${topMadres.length ? topMadres.map(([nombre,count],i) => `
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:3px">
              <span><strong>#${i+1}</strong> ${esc(nombre)}</span><span style="color:#1a3a2a;font-weight:700">${count} potrillos</span>
            </div>
            <div style="background:#f0f0f0;border-radius:4px;height:6px">
              <div style="background:#1a3a2a;height:6px;border-radius:4px;width:${(count/maxMadre*100)}%"></div>
            </div>
          </div>`).join('') : '<p style="color:#999;font-size:0.85rem">Sin datos</p>'}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px">
      <div style="background:#fff;border-radius:12px;padding:20px;border:1px solid #e8dcc8">
        <h3 style="color:#1a3a2a;font-family:'Playfair Display';margin:0 0 16px;border-bottom:2px solid #c9a84c;padding-bottom:8px">🩸 Sangres más repetidas (ABM)</h3>
        <table style="width:100%;font-size:0.85rem">
          ${topAbm.map(([abm,count],i)=>`<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:6px 0"><strong>#${i+1}</strong> ${esc(abm)}</td><td style="text-align:right;color:#c9a84c;font-weight:700">${count}</td></tr>`).join('')}
        </table>
      </div>
      <div style="background:#fff;border-radius:12px;padding:20px;border:1px solid #e8dcc8">
        <h3 style="color:#1a3a2a;font-family:'Playfair Display';margin:0 0 16px;border-bottom:2px solid #c9a84c;padding-bottom:8px">✕ Cruces realizados</h3>
        <table style="width:100%;font-size:0.82rem">
          ${topCruces.map(([cruce,count],i)=>`<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:6px 0">${esc(cruce)}</td><td style="text-align:right;color:#1a3a2a;font-weight:700;white-space:nowrap">${count} ${count>1?'hijos':'hijo'}</td></tr>`).join('')}
        </table>
      </div>
    </div>
    <div style="background:#fff;border-radius:12px;padding:20px;border:1px solid #e8dcc8">
      <h3 style="color:#1a3a2a;font-family:'Playfair Display';margin:0 0 16px;border-bottom:2px solid #c9a84c;padding-bottom:8px">🌳 Árbol Genealógico</h3>
      <div style="margin-bottom:16px">
        <label style="font-size:0.85rem;color:#666">Selecciona un animal:</label>
        <select id="tree-select" class="form-input" style="max-width:350px;margin-top:6px" onchange="renderArbol()">
          <option value="">-- Seleccionar --</option>
          ${animalOptions}
        </select>
      </div>
      <div id="arbol-container"></div>
    </div>
  `;
}

function renderArbol() {
  const id = parseInt(document.getElementById('tree-select').value);
  const container = document.getElementById('arbol-container');
  if(!id){ container.innerHTML=''; return; }
  const animal = DB.animales.find(a=>a.id===id);
  if(!animal){ container.innerHTML=''; return; }
  const padre = DB.animales.find(a=>a.nombre===animal.padre);
  const madre = DB.animales.find(a=>a.nombre===animal.madre);
  const box = (nombre, sub, color='#1a3a2a', bg='#f5f0e8') =>
    `<div style="background:${bg};border:2px solid ${color};border-radius:10px;padding:12px 16px;text-align:center;min-width:160px">
      <div style="font-weight:700;color:${bg==='#1a3a2a'?'#fff':color};font-size:0.9rem">${esc(nombre||'-')}</div>
      ${sub?`<div style="font-size:0.75rem;color:${bg==='#1a3a2a'?'#c9a84c':'#666'};margin-top:2px">${sub}</div>`:''}
    </div>`;
  container.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:0">
      <div style="display:flex;gap:80px;margin-bottom:0">
        ${box(animal.abm||'ABM Paterno','ABM / Semental','#c9a84c','#fff8e8')}
        ${box(madre?.abm||'ABM Materno','ABM / Semental','#c9a84c','#fff8e8')}
      </div>
      <div style="display:flex;gap:80px;height:30px">
        <div style="width:2px;background:#c9a84c;margin:0 auto"></div>
        <div style="width:2px;background:#c9a84c;margin:0 auto"></div>
      </div>
      <div style="display:flex;gap:80px;margin-bottom:0">
        ${box(animal.padre||'Padre desconocido', padre?`${calcMeses(padre.fecha_nac)}`:'Externo','#1a3a2a','#e8f0e8')}
        ${box(animal.madre||'Madre desconocida', madre?`${calcMeses(madre.fecha_nac)}`:'Externa','#2d5a3d','#e8f4e8')}
      </div>
      <div style="display:flex;justify-content:center;height:40px;width:320px;position:relative">
        <div style="position:absolute;left:25%;top:0;width:2px;height:100%;background:#1a3a2a"></div>
        <div style="position:absolute;right:25%;top:0;width:2px;height:100%;background:#2d5a3d"></div>
        <div style="position:absolute;left:25%;top:100%;width:50%;height:2px;background:#1a3a2a;transform:translateY(-100%)"></div>
      </div>
      <div style="transform:translateY(-8px)">
        ${box(animal.nombre, `${animal.genero==='M'?'Macho':'Hembra'} · ${calcMeses(animal.fecha_nac)} · ${animal.andar||''}`, '#fff', '#1a3a2a')}
      </div>
    </div>
  `;
}

  showLoading();

    await seedIfEmpty();

  } catch(e) {
    console.error('Init error', e);
  }
  hideLoading();
  populateDataLists();
  renderDashboard();
}

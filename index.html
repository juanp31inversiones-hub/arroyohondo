<html lang="es">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arroyohondo - Sistema de Gestión</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f5f0e8;color:#222;display:flex;min-height:100vh}
    #app{display:flex;width:100%;min-height:100vh}

    /* LOADING */
    #loading-screen{position:fixed;inset:0;background:#f5f0e8;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
    .spinner{width:48px;height:48px;border:5px solid #d1d5db;border-top-color:#2d5a3d;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loading-screen p{color:#6b7280;font-size:0.9rem}

    /* SIDEBAR */
    #sidebar{width:240px;min-height:100vh;background:#1a3a2a;display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100}
    .sidebar-header{padding:24px 20px 20px;border-bottom:1px solid #2d5a3d;display:flex;align-items:center;gap:12px}
    .logo-horse{font-size:2rem}
    .logo-title{font-family:'Playfair Display',serif;color:#c9a84c;font-size:1.1rem;font-weight:700;letter-spacing:1px}
    .logo-sub{color:#6b9b7a;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase}
    .nav-menu{list-style:none;padding:12px 0;flex:1}
    .nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;color:#a8c4b0;cursor:pointer;transition:all .2s;font-size:0.875rem;font-weight:500;border-left:3px solid transparent}
    .nav-item:hover{background:#2d5a3d;color:#fff}
    .nav-item.active{background:#2d5a3d;color:#c9a84c;border-left-color:#c9a84c}
    .nav-item .icon{font-size:1.1rem;width:22px;text-align:center}

    /* MAIN */
    #main{margin-left:240px;flex:1;padding:32px;min-height:100vh}
    .section{display:none}
    .section.active{display:block}

    /* PAGE HEADER */
    .page-header{margin-bottom:28px}
    .page-header h1{font-family:'Playfair Display',serif;font-size:1.8rem;color:#1a3a2a;font-weight:700}
    .page-header p{color:#6b7280;font-size:0.875rem;margin-top:4px}

    /* CARDS */
    .card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px}
    .stat-card{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid #c9a84c}
    .stat-card.green{border-left-color:#2d5a3d}
    .stat-card.red{border-left-color:#dc2626}
    .stat-card.blue{border-left-color:#2563eb}
    .stat-card.teal{border-left-color:#0d9488}
    .stat-num{font-size:2rem;font-weight:700;color:#1a3a2a;font-family:'Playfair Display',serif}
    .stat-label{font-size:0.8rem;color:#6b7280;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

    /* TOOLBAR */
    .toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
    .toolbar input,.toolbar select{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.85rem;background:#fff;font-family:'Inter',sans-serif;outline:none}
    .toolbar input:focus,.toolbar select:focus{border-color:#2d5a3d}
    .toolbar input{min-width:200px}
    .btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:0.85rem;font-weight:500;font-family:'Inter',sans-serif;transition:all .2s}
    .btn-primary{background:#2d5a3d;color:#fff}
    .btn-primary:hover{background:#1a3a2a}
    .btn-gold{background:#c9a84c;color:#fff}
    .btn-gold:hover{background:#b8942e}
    .btn-sm{padding:5px 12px;font-size:0.78rem}
    .btn-danger{background:#dc2626;color:#fff}
    .btn-danger:hover{background:#b91c1c}
    .btn-edit{background:#e0f2fe;color:#0369a1}
    .btn-edit:hover{background:#bae6fd}

    /* TABLE */
    .table-wrap{overflow-x:auto;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    table{width:100%;border-collapse:collapse;background:#fff;font-size:0.83rem}
    thead tr{background:#1a3a2a;color:#fff}
    thead th{padding:12px 14px;text-align:left;font-weight:600;white-space:nowrap;font-size:0.78rem;letter-spacing:.4px;text-transform:uppercase}
    tbody tr{border-bottom:1px solid #f3f4f6;transition:background .15s}
    tbody tr:hover{background:#f9fafb}
    tbody td{padding:11px 14px;vertical-align:middle}
    .actions{display:flex;gap:6px;white-space:nowrap}

    /* BADGES */
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.73rem;font-weight:600;white-space:nowrap}
    .badge-green{background:#d1fae5;color:#065f46}
    .badge-red{background:#fee2e2;color:#991b1b}
    .badge-blue{background:#dbeafe;color:#1e40af}
    .badge-orange{background:#fed7aa;color:#9a3412}
    .badge-teal{background:#ccfbf1;color:#115e59}
    .badge-purple{background:#ede9fe;color:#5b21b6}
    .badge-gray{background:#f3f4f6;color:#374151}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center}
    .modal-box{background:#fff;border-radius:16px;width:min(700px,95vw);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-header{padding:20px 24px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
    .modal-header span{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:600;color:#1a3a2a}
    .modal-header button{background:none;border:none;font-size:1.3rem;cursor:pointer;color:#6b7280;line-height:1}
    .modal-header button:hover{color:#111}
    .modal-body{padding:24px;overflow-y:auto;flex:1}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-grid.cols3{grid-template-columns:1fr 1fr 1fr}
    .form-full{grid-column:1/-1}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-group label{font-size:0.8rem;font-weight:600;color:#374151;text-transform:uppercase;letter-spacing:.3px}
    .form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.875rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#2d5a3d}
    .form-group textarea{resize:vertical;min-height:70px}
    .modal-footer{padding:16px 24px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:10px}
    .btn-cancel{background:#f3f4f6;color:#374151}
    .btn-cancel:hover{background:#e5e7eb}

    /* DASHBOARD */
    .dash-section-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:#1a3a2a;margin:24px 0 12px;font-weight:600}
    .recent-table table{font-size:0.82rem}

    /* FERIAS */
    .trophy{color:#c9a84c;font-weight:700}

    /* NOMINA */
    .nomina-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:4px solid #2d5a3d}
    .nomina-name{font-family:'Playfair Display',serif;font-size:1.1rem;color:#1a3a2a;margin-bottom:12px;font-weight:600}
    .nomina-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:0.83rem}
    .nomina-row:last-child{border-bottom:none}
    .nomina-total{font-weight:700;color:#1a3a2a;font-size:0.9rem;margin-top:8px}
    .nomina-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}

    /* CONSUMOS */
    tfoot tr{background:#f5f0e8;font-weight:700}
    tfoot td{padding:11px 14px}
  </style>
</head>

// ── IN-MEMORY CACHE ───────────────────────────────────
let DB = { animales:[], saltos:[], embriones:[], nomina:[], consumos:[], ferias:[] };

// ── HELPERS ──────────────────────────────────────────
function formatPeso(n){
  if(!n && n!==0) return '-';
  return '$' + Number(n).toLocaleString('es-CO');
}
function calcMeses(fechaNac){
  if(!fechaNac) return '-';
  const hoy = new Date('2026-06-24');
  const nac = new Date(fechaNac);
  if(isNaN(nac)) return '-';
  let m = (hoy.getFullYear()-nac.getFullYear())*12 + (hoy.getMonth()-nac.getMonth());
  if(m < 0) m = 0;
  const y = Math.floor(m/12);
  const mo = m%12;
  return y > 0 ? `${y}a ${mo}m` : `${mo}m`;
}
function estadoBadge(e){
  const map = {
    'En Propiedad':'badge-green','Vendido':'badge-red','Cedido':'badge-blue',
    'Pendiente':'badge-orange','Confirmada':'badge-teal','Nacido':'badge-purple',
    'Hecho':'badge-green','Enviado':'badge-gray'
  };
  return `<span class="badge ${map[e]||'badge-gray'}">${e}</span>`;
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── LOADING UI ────────────────────────────────────────
function showLoading(){ document.getElementById('loading-screen').style.display='flex'; document.getElementById('app').style.display='none'; }
function hideLoading(){ document.getElementById('loading-screen').style.display='none'; document.getElementById('app').style.display='flex'; }

// ── SUPABASE SEED ─────────────────────────────────────
async function seedIfEmpty(){
  // Check if animales table has data
  const {count} = await db.from('animales').select('*',{count:'exact',head:true});
  if(count > 0) return; // Already seeded

  // Seed all tables
  const tables = ['animales','saltos','embriones','nomina','consumos','ferias'];
  for(const t of tables){
    const rows = INITIAL_DATA[t];
    if(rows && rows.length){
      const {error} = await db.from(t).insert(rows);
      if(error) console.error('Seed error on',t,error);
    }
  }
}

// ── LOAD ALL DATA ─────────────────────────────────────
async function loadAllData(){
  const tables = ['animales','saltos','embriones','nomina','consumos','ferias'];
  await Promise.all(tables.map(async t => {
    const {data,error} = await db.from(t).select('*').order('id');
    if(error){ console.error(t,error); return; }
    DB[t] = data || [];
  }));
}

// ── NAVIGATION ────────────────────────────────────────
let currentSection = 'dashboard';
function showSection(name){
  currentSection = name;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>{
    if(n.getAttribute('onclick') && n.getAttribute('onclick').includes("'"+name+"'")) n.classList.add('active');
  });
  const renders = {dashboard:renderDashboard,animales:renderAnimales,saltos:renderSaltos,embriones:renderEmbriones,ferias:renderFerias,nomina:renderNomina,consumos:renderConsumos};
  if(renders[name]) renders[name]();
}

let _modalSaveFn = null;

  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  _modalSaveFn = saveFn;
  document.getElementById('modal').style.display = 'flex';
}
function closeModal(){ document.getElementById('modal').style.display = 'none'; _modalSaveFn = null; }
function modalSave(){ if(_modalSaveFn) _modalSaveFn(); }
document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

function renderDashboard(){

  const total = DB.animales.length;

  const machos = DB.animales.filter(a=>a.genero==='M'&&a.estado==='En Propiedad').length;
  const hembras = DB.animales.filter(a=>a.genero==='H'&&a.estado==='En Propiedad').length;
  const pendSaltos = DB.saltos.filter(s=>s.estado==='Pendiente').length;
  const confirmSaltos = DB.saltos.filter(s=>s.estado==='Confirmada').length;
  const pendEmb = DB.embriones.filter(e=>e.estado==='Pendiente').length;
  const totalNomina = DB.nomina.reduce((a,n)=>a+n.neto_pagado,0);

function filterAnimales(){

  const genero = (document.getElementById('anim-genero')||{}).value||'';

  const rows = DB.animales.filter(a=>{

// ── FERIAS ────────────────────────────────────────────
function renderFerias(){
  const el = document.getElementById('sec-ferias');
  const animales = [...new Set(DB.ferias.map(f=>f.animal))].sort();
  el.innerHTML = `
    <div class="page-header">
      <h1>🏆 Record de Ferias</h1>
      <p>Historial de participaciones en exposiciones ecuestres</p>
    </div>
    <div class="toolbar">
      <select id="fer-animal" onchange="filterFerias()">
        <option value="">Todos los animales</option>
        ${animales.map(a=>`<option>${esc(a)}</option>`).join('')}
      </select>
      <input type="text" id="fer-search" placeholder="Buscar feria..." oninput="filterFerias()">
      <button class="btn btn-primary" onclick="addFeria()">+ Agregar Registro</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Animal</th><th>Feria</th><th>Año</th><th>Grado</th><th>Categoría</th>
          <th>Posición</th><th>Puntos</th><th>Campeonato</th><th>Acciones</th>
        </tr></thead>
        <tbody id="fer-tbody"></tbody>
      </table>
    </div>`;
  filterFerias();
}
function filterFerias(){
  const animal = (document.getElementById('fer-animal')||{}).value||'';
  const search = (document.getElementById('fer-search')||{}).value?.toLowerCase()||'';
  const rows = DB.ferias.filter(f=>{
    if(animal && f.animal!==animal) return false;
    if(search && !f.feria.toLowerCase().includes(search)) return false;
    return true;
  });
  const tbody = document.getElementById('fer-tbody');
  if(!tbody) return;
  tbody.innerHTML = rows.map(f=>`
    <tr>
      <td><strong>${esc(f.animal)}</strong></td>
      <td>${esc(f.feria)}</td>
      <td>${f.anio}</td>
      <td><span class="badge badge-blue">${esc(f.grado)}</span></td>
      <td>${esc(f.categoria)}</td>
      <td><strong class="trophy">${esc(f.posicion)}</strong></td>
      <td>${f.puntos}</td>
      <td>${f.campeonato?`<span class="badge badge-purple">${esc(f.campeonato)}</span>`:'-'}</td>
      <td class="actions">
        <button class="btn btn-sm btn-edit" onclick="editFeria(${f.id})">Editar</button>
        <button class="btn btn-sm btn-danger" onclick="deleteFeria(${f.id})">Borrar</button>
      </td>
    </tr>`).join('');
}
function feriaForm(f={}){
  return `<div class="form-grid">
    <div class="form-group form-full"><label>Animal</label><input id="f-animal" value="${esc(f.animal||'')}"></div>
    <div class="form-group form-full"><label>Feria</label><input id="f-feria" value="${esc(f.feria||'')}"></div>
    <div class="form-group"><label>Año</label><input type="number" id="f-anio" value="${f.anio||new Date().getFullYear()}"></div>
    <div class="form-group"><label>Grado</label><input id="f-grado" value="${esc(f.grado||'')}"></div>
    <div class="form-group"><label>Categoría</label><input id="f-categoria" value="${esc(f.categoria||'')}"></div>
    <div class="form-group"><label>Posición</label><input id="f-posicion" value="${esc(f.posicion||'')}"></div>
    <div class="form-group"><label>Puntos</label><input type="number" id="f-puntos" value="${f.puntos||0}"></div>
    <div class="form-group"><label>Campeonato</label><input id="f-campeonato" value="${esc(f.campeonato||'')}"></div>

}
function getFeriaFormData(){
  return {
    animal:document.getElementById('f-animal').value,
    feria:document.getElementById('f-feria').value,
    anio:Number(document.getElementById('f-anio').value),
    grado:document.getElementById('f-grado').value,
    categoria:document.getElementById('f-categoria').value,
    posicion:document.getElementById('f-posicion').value,
    puntos:Number(document.getElementById('f-puntos').value)||0,
    campeonato:document.getElementById('f-campeonato').value
  };
}
async function addFeria(){
  openModal('Agregar Registro de Feria', feriaForm(), async ()=>{
    const d = getFeriaFormData();
    if(!d.animal||!d.feria){alert('Animal y feria son requeridos');return;}
    const {data,error} = await db.from('ferias').insert([d]).select();
    if(error){alert('Error: '+error.message);return;}
    DB.ferias.push(data[0]);
    closeModal(); filterFerias();
  });
}
async function editFeria(id){
  const f = DB.ferias.find(x=>x.id===id);
  if(!f) return;
  openModal('Editar Registro de Feria', feriaForm(f), async ()=>{
    const d = getFeriaFormData();
    const {error} = await db.from('ferias').update(d).eq('id',id);
    if(error){alert('Error: '+error.message);return;}
    Object.assign(f, d);
    closeModal(); filterFerias();
  });
}
async function deleteFeria(id){
  if(!confirm('¿Eliminar este registro?')) return;
  const {error} = await db.from('ferias').delete().eq('id',id);
  if(error){alert('Error: '+error.message);return;}
  DB.ferias = DB.ferias.filter(x=>x.id!==id);
  filterFerias();
}
